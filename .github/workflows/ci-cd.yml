# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Hybrid Drift Detection Dashboard
#
# Triggers:
#   • Every push to any branch      → lint + test
#   • Pull request to main          → lint + test
#   • Push / merge to main          → lint + test + docker build & push + deploy
#
# Secrets required (set in GitHub → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   Your Docker Hub username
#   DOCKERHUB_TOKEN      Docker Hub access token  (Account Settings → Security)
#   RENDER_DEPLOY_HOOK   Render deploy hook URL   (Render → Service → Settings → Deploy hook)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]          # lint + test on every branch push
  pull_request:
    branches: [main]          # lint + test on PRs targeting main

# Cancel any in-progress run for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hybrid-drift-detection

jobs:
  # ── 1. LINT & SYNTAX CHECK ─────────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 pyflakes

      - name: Syntax check — pyflakes (fast, zero config)
        run: pyflakes app.py statistical_detector.py

      - name: Style check — flake8
        run: |
          flake8 app.py statistical_detector.py tests/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E203 \
            --statistics

  # ── 2. TESTS ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint                # only run if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. DOCKER BUILD & PUSH ───────────────────────────────────────────────────
  # Only runs on push to main (not on PRs or feature branches)
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                # only if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with full git SHA  (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Always update the 'latest' tag on main
            type=raw,value=latest,enable=true

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} → ${{ steps.meta.outputs.tags }}"

  # ── 4. AUTO-DEPLOY TO RENDER ────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker              # only after image is successfully pushed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}")

          echo "Render API response: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "Deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "Deploy triggered successfully."

      - name: Summary
        run: |
          echo "### ✅ Deployment triggered" >> $GITHUB_STEP_SUMMARY
          echo "Image \`${{ env.IMAGE_NAME }}:latest\` is deploying to Render." >> $GITHUB_STEP_SUMMARY
          echo "Check your Render dashboard for live status." >> $GITHUB_STEP_SUMMARY
